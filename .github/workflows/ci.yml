name: CI

on:
  push:
  pull_request:

jobs:
  build:
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        perl-version:
          - 5.26.3
          - 5.32.1
          - 5.36.3
          - 5.38.5
          - 5.40.4
          - 5.42.2
          - 5.43.9
          - 5.44.0
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Build and validate image
        env:
          PERL_VERSION: ${{ matrix.perl-version }}
          CI_PLATFORM: ${{ matrix.platform }}
        run: scripts/ci-build.sh

  codex:
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Build and validate Codex image
        env:
          PERL_VERSION: 5.44.0
          CI_PLATFORM: ${{ matrix.platform }}
        run: scripts/ci-build.sh codex
